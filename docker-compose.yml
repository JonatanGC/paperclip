services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build: .
    working_dir: /app
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: 3100
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      # This helps Node resolve the workspace modules
      NODE_OPTIONS: "--extensionless-loader" 
    volumes:
      # ONLY mount the specific data folder, never the whole /app
      - paperclip-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node server/dist/index.js || (echo 'Still failing. Checking file existence...' && tail -f /dev/null)"
      
volumes:
  pgdata:
  paperclip-data:
